<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Solar Panel Pattern -->
    <pattern id="solarPanel" x="0" y="0" width="40" height="60" patternUnits="userSpaceOnUse">
      <rect width="40" height="60" fill="#1a3a5c"/>
      <rect x="2" y="2" width="36" height="56" fill="#2d5a87"/>
      <line x1="2" y1="20" x2="38" y2="20" stroke="#4a90d9" stroke-width="1"/>
      <line x1="2" y1="40" x2="38" y2="40" stroke="#4a90d9" stroke-width="1"/>
    </pattern>
    
    <!-- Water Pattern -->
    <pattern id="waterPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M0 10 Q5 5 10 10 T20 10" stroke="#4a90d9" stroke-width="2" fill="none"/>
    </pattern>
    
    <!-- Gradient for pipes -->
    <linearGradient id="pipeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#666666"/>
      <stop offset="50%" style="stop-color:#888888"/>
      <stop offset="100%" style="stop-color:#666666"/>
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="flowArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#27ae60"/>
    </marker>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#f5f5f0"/>
  
  <!-- Title Block -->
  <rect x="50" y="30" width="1100" height="60" fill="#2c3e50" rx="5"/>
  <text x="600" y="55" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">QUILIMA VINEYARDS - SOLAR ARRAY TECHNICAL SCHEMATIC</text>
  <text x="600" y="75" font-family="Arial, sans-serif" font-size="14" fill="#bdc3c7" text-anchor="middle">4kW Solar Installation | Sector B | Client Review 2026-03-29</text>
  
  <!-- Site Boundary -->
  <rect x="100" y="120" width="1000" height="600" fill="none" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="1050" y="140" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">Property Boundary</text>
  
  <!-- Sector Labels -->
  <text x="200" y="180" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#34495e">Sector A</text>
  <text x="700" y="180" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#27ae60">Sector B</text>
  <text x="950" y="400" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#34495e">Sector C</text>
  
  <!-- Solar Array (4kW) near Sector B -->
  <g transform="translate(550, 220)" filter="url(#shadow)">
    <rect x="0" y="0" width="280" height="180" fill="#ecf0f1" stroke="#34495e" stroke-width="2" rx="5"/>
    <text x="140" y="-15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">4kW SOLAR ARRAY</text>
    
    <!-- Solar Panels Grid (10 panels x 400W each = 4kW) -->
    <rect x="10" y="10" width="120" height="75" fill="url(#solarPanel)" stroke="#34495e" stroke-width="1"/>
    <rect x="140" y="10" width="120" height="75" fill="url(#solarPanel)" stroke="#34495e" stroke-width="1"/>
    <rect x="10" y="95" width="120" height="75" fill="url(#solarPanel)" stroke="#34495e" stroke-width="1"/>
    <rect x="140" y="95" width="120" height="75" fill="url(#solarPanel)" stroke="#34495e" stroke-width="1"/>
    
    <!-- Panel Labels -->
    <text x="70" y="55" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">400W</text>
    <text x="200" y="55" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">400W</text>
    <text x="70" y="140" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">400W</text>
    <text x="200" y="140" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">400W</text>
    
    <!-- Inverter Box -->
    <rect x="250" y="60" width="50" height="60" fill="#e74c3c" stroke="#c0392b" stroke-width="2" rx="3"/>
    <text x="275" y="85" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">DC/AC</text>
    <text x="275" y="100" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Inverter</text>
  </g>
  
  <!-- Solar Array Specifications Box -->
  <g transform="translate(550, 430)">
    <rect x="0" y="0" width="280" height="100" fill="#ffffff" stroke="#34495e" stroke-width="1" rx="5"/>
    <text x="140" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50" text-anchor="middle">SPECIFICATIONS</text>
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Total Capacity: 4.0 kW</text>
    <text x="10" y="58" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Panels: 10 × 400W Monocrystalline</text>
    <text x="10" y="76" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Inverter: 4.5kW DC/AC</text>
    <text x="150" y="40" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Est. Output: 16-20 kWh/day</text>
    <text x="150" y="58" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Mounting: Ground-fixed, 30° tilt</text>
    <text x="150" y="76" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Area: ~25 m²</text>
  </g>
  
  <!-- Main Reservoir -->
  <g transform="translate(150, 450)" filter="url(#shadow)">
    <!-- Reservoir Tank -->
    <ellipse cx="150" cy="100" rx="150" ry="50" fill="url(#waterPattern)" stroke="#3498db" stroke-width="3"/>
    <rect x="0" y="50" width="300" height="100" fill="url(#waterPattern)" stroke="#3498db" stroke-width="3"/>
    <ellipse cx="150" cy="150" rx="150" ry="50" fill="#3498db" stroke="#2980b9" stroke-width="3"/>
    
    <!-- Reservoir Label -->
    <text x="150" y="90" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">MAIN RESERVOIR</text>
    <text x="150" y="110" font-family="Arial, sans-serif" font-size="12" fill="#34495e" text-anchor="middle">Capacity: 50,000 L</text>
    
    <!-- Water Level Indicator -->
    <rect x="280" y="60" width="20" height="80" fill="#ecf0f1" stroke="#34495e" stroke-width="1"/>
    <rect x="282" y="80" width="16" height="40" fill="#3498db"/>
    <text x="290" y="150" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="middle">Level</text>
  </g>
  
  <!-- Piping Route (Proposed) -->
  <g>
    <!-- Main pipe from solar array to reservoir -->
    <path d="M 690 400 L 690 480 L 450 480 L 450 500" 
          fill="none" stroke="url(#pipeGradient)" stroke-width="12" stroke-linecap="round"/>
    <path d="M 690 400 L 690 480 L 450 480 L 450 500" 
          fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,5" stroke-linecap="round" 
          marker-end="url(#flowArrow)"/>
    
    <!-- Pipe labels -->
    <text x="700" y="440" font-family="Arial, sans-serif" font-size="11" fill="#27ae60" font-weight="bold">PVC Schedule 40</text>
    <text x="700" y="455" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">Ø 50mm (2")</text>
    
    <!-- Junction Box at Solar Array -->
    <circle cx="690" cy="400" r="15" fill="#f39c12" stroke="#d35400" stroke-width="2"/>
    <text x="690" y="405" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">JB-1</text>
  </g>
  
  <!-- Pump Station -->
  <g transform="translate(420, 500)" filter="url(#shadow)">
    <rect x="0" y="0" width="60" height="50" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2" rx="5"/>
    <circle cx="30" cy="25" r="15" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    <text x="30" y="30" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">PUMP</text>
    <text x="30" y="-10" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50" text-anchor="middle">PUMP STATION</text>
  </g>
  
  <!-- Distance Markers -->
  <g>
    <line x1="550" y1="200" x2="550" y2="190" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="830" y1="200" x2="830" y2="190" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="550" y1="195" x2="830" y2="195" stroke="#7f8c8d" stroke-width="1"/>
    <text x="690" y="185" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">~280m</text>
    
    <line x1="690" y1="400" x2="690" y2="480" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="700" y1="400" x2="700" y2="480" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="695" y1="400" x2="700" y2="400" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="695" y1="480" x2="700" y2="480" stroke="#7f8c8d" stroke-width="1"/>
    <text x="710" y="445" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">~80m</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(900, 500)">
    <rect x="0" y="0" width="250" height="180" fill="#ffffff" stroke="#34495e" stroke-width="1" rx="5"/>
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">LEGEND</text>
    
    <rect x="15" y="40" width="30" height="20" fill="url(#solarPanel)" stroke="#34495e" stroke-width="1"/>
    <text x="55" y="55" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Solar Panel (400W)</text>
    
    <rect x="15" y="70" width="30" height="20" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
    <text x="55" y="85" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Inverter</text>
    
    <line x1="15" y1="105" x2="45" y2="105" stroke="url(#pipeGradient)" stroke-width="8"/>
    <text x="55" y="110" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Piping Route (Proposed)</text>
    
    <circle cx="30" cy="135" r="8" fill="#f39c12" stroke="#d35400" stroke-width="2"/>
    <text x="55" y="140" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Junction Box</text>
    
    <rect x="15" y="150" width="30" height="20" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
    <text x="55" y="165" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Pump Station</text>
    
    <ellipse cx="30" cy="180" rx="15" ry="8" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
    <text x="55" y="185" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Reservoir</text>
  </g>
  
  <!-- North Arrow -->
  <g transform="translate(1050, 150)">
    <line x1="0" y1="40" x2="0" y2="0" stroke="#2c3e50" stroke-width="3"/>
    <polygon points="-8,10 0,0 8,10" fill="#2c3e50"/>
    <text x="0" y="-10" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">N</text>
  </g>
  
  <!-- Scale Bar -->
  <g transform="translate(100, 700)">
    <line x1="0" y1="0" x2="200" y2="0" stroke="#2c3e50" stroke-width="3"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#2c3e50" stroke-width="2"/>
    <line x1="100" y1="-5" x2="100" y2="5" stroke="#2c3e50" stroke-width="2"/>
    <line x1="200" y1="-5" x2="200" y2="5" stroke="#2c3e50" stroke-width="2"/>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">0m</text>
    <text x="100" y="20" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">50m</text>
    <text x="200" y="20" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="end">100m</text>
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">Not to scale</text>
  </g>
  
  <!-- Notes Section -->
  <g transform="translate(100, 580)">
    <rect x="0" y="0" width="400" height="100" fill="#ffffff" stroke="#34495e" stroke-width="1" rx="5"/>
    <text x="10" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">INSTALLATION NOTES:</text>
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="10" fill="#34495e">1. Solar array positioned 15m from Sector B vineyard rows</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="10" fill="#34495e">2. Piping route avoids existing irrigation infrastructure</text>
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="10" fill="#34495e">3. Pump station requires 220V AC connection from inverter</text>
    <text x="10" y="85" font-family="Arial, sans-serif" font-size="10" fill="#34495e">4. All buried piping at 600mm depth (frost line protection)</text>
  </g>
  
  <!-- Revision Block -->
  <g transform="translate(900, 700)">
    <rect x="0" y="0" width="250" height="80" fill="#ecf0f1" stroke="#34495e" stroke-width="1"/>
    <text x="10" y="18" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2c3e50">REVISION HISTORY:</text>
    <text x="10" y="35" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Rev A | 2026-03-29 | Initial schematic for client review</text>
    <text x="10" y="50" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Prepared by: OpenClaw Engineering</text>
    <text x="10" y="65" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Status: DRAFT - For Review</text>
  </g>
</svg>
